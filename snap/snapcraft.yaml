name: asvp
base: core22
version: '1.0'
summary: Terminal audio spectrum visualizer
description: |
  A lightweight, terminal-based audio spectrum visualizer for Linux.
  Hooks directly into PulseAudio/PipeWire and draws a 32-bar frequency spectrum.

grade: stable
confinement: strict

# This section "tricks" the app into finding pactl in the standard /usr/bin path
layout:
  /usr/bin/pactl:
    symlink: $SNAP/usr/bin/pactl

parts:
  asvp:
    plugin: cmake
    source: .
    build-packages:
      - libpulse-dev
      - libfftw3-dev
      - libncursesw5-dev
      - pkg-config
      - g++
    stage-packages:
      - libpulse0
      - libfftw3-double3
      - libncursesw6
      - pulseaudio-utils # This provides the 'pactl' binary your code calls

apps:
  asvp:
    command: bin/asvp
    plugs:
      - audio-playback
      - audio-record
      - pulseaudio
      - home